<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Sathi - Fixed Audio Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 450px; margin: 30px auto; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #00ff88; }
        .activate-btn { background-color: #00ff88; color: #121212; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .status { margin-top: 20px; font-weight: bold; color: #ffcc00; padding: 10px; border-radius: 5px; background: rgba(255, 204, 0, 0.1); }
        .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .test-btn { background: #2c2c2c; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .log-box { background: #000; color: #00ff88; padding: 12px; text-align: left; height: 120px; overflow-y: auto; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏍️ BIKE SATHI (FIXED)</h2>
    <p style="color: #aaa;">Audio Extension: .wav Detected</p>
    
    <button class="activate-btn" id="mainBtn" onclick="activateAudio()">1. CLICK TO ACTIVATE AUDIO</button>
    
    <div class="status" id="statusText">Awaiting Activation...</div>
    
    <div class="test-grid">
        <button class="test-btn" onclick="playSound(0)">🔊 Play Sound 1</button>
        <button class="test-btn" onclick="playSound(1)">🔊 Play Sound 2</button>
        <button class="test-btn" onclick="playSound(2)">🔊 Play Sound 3</button>
        <button class="test-btn" onclick="playSound(3)">🔊 Play Sound 4</button>
    </div>
    
    <div class="log-box" id="logBox">System ready. Update code and try again.<br></div>
</div>

<script>
// AAPKI REPOSITORY KI EXACT .WAV FILES KE RAW LINKS
const sounds = [
    "https://raw.githubusercontent.com/LogicalDoor-804/BIKE-SATHI-/main/1.wav",
    "https://raw.githubusercontent.com/LogicalDoor-804/BIKE-SATHI-/main/2.wav",
    "https://raw.githubusercontent.com/LogicalDoor-804/BIKE-SATHI-/main/3.wav",
    "https://raw.githubusercontent.com/LogicalDoor-804/BIKE-SATHI-/main/4.wav"
];

let audioActivated = false;

function addLog(msg) {
    const logBox = document.getElementById('logBox');
    logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function activateAudio() {
    audioActivated = true;
    document.getElementById('statusText').innerText = "🟢 AUDIO SYSTEM RUNNING";
    document.getElementById('statusText').style.color = "#00ff88";
    document.getElementById('statusText').style.background = "rgba(0, 255, 136, 0.1)";
    document.getElementById('mainBtn').style.background = "#333";
    document.getElementById('mainBtn').style.color = "#aaa";
    addLog("Mobile Browser restrictions unlocked.");
    
    // Test hit
    playSound(0);
}

function playSound(index) {
    if (!audioActivated) {
        alert("Pehle bade green button 'CLICK TO ACTIVATE AUDIO' par click karein!");
        return;
    }
    
    addLog(`Loading Audio ${index + 1}...`);
    
    // Mobile browsers ke liye standard audio object aur preload forced
    let audio = new Audio();
    audio.src = sounds[index];
    audio.preload = "auto";
    
    audio.play()
        .then(() => {
            addLog(`Playing: Sound ${index + 1} started!`);
        })
        .catch(err => {
            addLog(`❌ Playback Failed: ${err.message}`);
            console.error(err);
        });
}
</script>

</body>
</html>
