<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Sathi - Audio Fixed</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 450px; margin: 30px auto; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #00ff88; }
        .activate-btn { background-color: #00ff88; color: #121212; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .status { margin-top: 20px; font-weight: bold; color: #ffcc00; padding: 10px; border-radius: 5px; background: rgba(255, 204, 0, 0.1); }
        .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .test-btn { background: #2c2c2c; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .log-box { background: #000; color: #00ff88; padding: 12px; text-align: left; height: 160px; overflow-y: auto; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏍️ BIKE SATHI Dashboard</h2>
    <p style="color: #aaa;">Debugging Audio Path Mode</p>
    
    <button class="activate-btn" id="mainBtn" onclick="activateAudio()">1. CLICK TO ACTIVATE AUDIO</button>
    
    <div class="status" id="statusText">Awaiting Activation...</div>
    
    <div class="test-grid">
        <button class="test-btn" onclick="playSound(0)">🔊 Play final.m4a</button>
        <button class="test-btn" onclick="playSound(1)">🔊 Play 1.m4a</button>
        <button class="test-btn" onclick="playSound(2)">🔊 Play 2.m4a</button>
        <button class="test-btn" onclick="playSound(3)">🔊 Play 3.m4a</button>
    </div>
    
    <div class="log-box" id="logBox">Logs ready...<br></div>
</div>

<script>
// Base URL jahan aapki files hain
const baseUrl = "https://raw.githubusercontent.com/LogicalDoor-804/BIKE-SATHI-/main/";

// Audio files ki list (Case-sensitive debugging ke liye alag format)
const fileNames = [
    "final.m4a",
    "1.m4a",
    "2.m4a",
    "3.m4a"
];

let audioActivated = false;

function addLog(msg) {
    const logBox = document.getElementById('logBox');
    logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function activateAudio() {
    audioActivated = true;
    document.getElementById('statusText').innerText = "🟢 AUDIO SYSTEM RUNNING";
    document.getElementById('statusText').style.color = "#00ff88";
    document.getElementById('statusText').style.background = "rgba(0, 255, 136, 0.1)";
    document.getElementById('mainBtn').style.background = "#333";
    document.getElementById('mainBtn').style.color = "#aaa";
    addLog("Audio system unlocked. Ready to test files.");
}

function playSound(index) {
    if (!audioActivated) {
        alert("Pehle bade green button 'CLICK TO ACTIVATE AUDIO' par click karein!");
        return;
    }
    
    let targetFile = fileNames[index];
    let fullUrl = baseUrl + targetFile;
    
    addLog(`Trying to load: ${targetFile}`);
    
    let audio = new Audio();
    audio.src = fullUrl;
    audio.preload = "auto";
    
    audio.play()
        .then(() => {
            addLog(`✅ Success! Playing: ${targetFile}`);
        })
        .catch(err => {
            addLog(`❌ Failed for ${targetFile}. Error: ${err.message}`);
            
            // Debugging Trick: Agar file lower case me fail hui, toh capital try karte hain inline
            if(targetFile.includes('.m4a')) {
                let altFile = targetFile.replace('.m4a', '.M4A');
                addLog(`🔄 Retrying with Capital Extension: ${altFile}...`);
                let altAudio = new Audio(baseUrl + altFile);
                altAudio.play()
                    .then(() => addLog(`✅ Success with Capital Extension!`))
                    .catch(e => addLog(`❌ Capital format also failed.`));
            }
        });
}
</script>

</body>
</html>
